version: 2.1
orbs:
  codecov: codecov/codecov@4.1.0

_machine_defaults: &machine_defaults
  environment:
    TZ: '/usr/share/zoneinfo/America/New_York'
  machine:
    image: default
    docker_layer_caching: true
  working_directory: /tmp/src/xcp_d
  resource_class: large

_docker_auth: &docker_auth
  name: Docker authentication
  command: |
    if [[ -n "$DOCKERHUB_TOKEN" ]]; then
      echo "$DOCKERHUB_TOKEN" | docker login -u $DOCKERHUB_USERNAME --password-stdin
    fi

_setup_docker_registry: &setup_docker_registry
  name: Set up local Docker registry
  command: |
    if [[ -f /tmp/images/registry.tar.gz ]]; then
      docker load < /tmp/images/registry.tar.gz
    else
      docker pull registry:2
    fi
    docker run -d -p 5000:5000 --restart=always --name=registry \
        -v /tmp/docker:/var/lib/registry registry:2

_pull_from_registry: &pull_from_registry
  name: Pull and tag production image from local registry
  command: |
    docker pull localhost:5000/xcp_d
    docker tag localhost:5000/xcp_d pennlinc/xcp_d:latest

_pull_test_image: &pull_test_image
  name: Pull and tag test image from local registry
  command: |
    docker pull localhost:5000/xcp_d-test
    docker tag localhost:5000/xcp_d-test pennlinc/xcp_d:test

commands:
  restore_build_and_data:
    description: Restore Docker image cache and test data cache
    steps:
      - restore_cache:
          keys:
            - build-v2-{{ checksum "Dockerfile" }}-{{ checksum "Dockerfile.base" }}-{{ checksum "pixi.lock" }}
      - restore_cache:
          keys:
            - data-v1-{{ .Branch }}-{{ .Revision }}
      - run: *docker_auth
      - run: *setup_docker_registry
      - run: *pull_test_image

  run_integration_test:
    description: Run a pytest-marked integration test inside test image
    parameters:
      marker:
        type: string
      cpus:
        type: integer
        default: 2
    steps:
      - run:
          name: Run xcp_d (<< parameters.marker >>)
          no_output_timeout: 5h
          command: |
            mkdir -p /tmp/out /tmp/work /tmp/coverage
            docker run --rm \
              -e CIRCLE_CPUS=<< parameters.cpus >> \
              -e COVERAGE_FILE=/coverage/.coverage.<< parameters.marker >> \
              -v /tmp/src/xcp_d:/tmp/src/xcp_d:ro \
              -v /tmp/data:/data \
              -v /tmp/out:/out \
              -v /tmp/work:/work \
              -v /tmp/coverage:/coverage \
              -w /tmp/src/xcp_d \
              --entrypoint pytest \
              pennlinc/xcp_d:test \
              -rP -o log_cli=true -m "<< parameters.marker >>" \
              --cov-append --cov-branch --cov-report term-missing --cov=xcp_d \
              --data_dir=/data --output_dir=/out --working_dir=/work \
              xcp_d
      - run:
          name: Clean up large artifacts
          when: always
          command: find /tmp/out/ -name "*.nii.gz" -type f -delete 2>/dev/null || true
      - store_artifacts:
          path: /tmp/out
      - persist_to_workspace:
          root: /tmp/coverage
          paths:
            - .coverage.<< parameters.marker >>

jobs:
  image_prep:
    <<: *machine_defaults
    environment:
      TZ: '/usr/share/zoneinfo/America/New_York'
      DOCKER_BUILDKIT: '1'
    steps:
      - checkout:
          path: /tmp/src/xcp_d
      - restore_cache:
          keys:
            - build-v2-{{ checksum "Dockerfile" }}-{{ checksum "Dockerfile.base" }}-{{ checksum "pixi.lock" }}
            - build-v1-{{ .Branch }}-{{ .Revision }}
            - build-v1-main-
      - run: *docker_auth
      - run: *setup_docker_registry
      - run:
          name: Get base image information
          command: |
            export BASE_IMAGE=$( grep "BASE_IMAGE=" Dockerfile | head -1 | cut -d= -f2 )
            export BASE_IMAGE_NAME=${BASE_IMAGE%:*}
            export BASE_TAG=${BASE_IMAGE#*:}
            echo "BASE_IMAGE=$BASE_IMAGE" >> $BASH_ENV
            echo "BASE_IMAGE_NAME=$BASE_IMAGE_NAME" >> $BASH_ENV
            echo "BASE_TAG=$BASE_TAG" >> $BASH_ENV
      - run:
          name: Determine whether image builds are required
          command: |
            if [[ -f /tmp/images/imageprep-success.marker ]]; then
              echo "BUILD_PRODUCTION_IMAGE=0" >> "$BASH_ENV"
              echo "BUILD_TEST_IMAGE=0" >> "$BASH_ENV"
            else
              echo "No successful cached image prep for current Docker inputs; rebuilding images."
              echo "BUILD_PRODUCTION_IMAGE=1" >> "$BASH_ENV"
              echo "BUILD_TEST_IMAGE=1" >> "$BASH_ENV"
            fi
      - run:
          name: Build base image if needed
          no_output_timeout: 90m
          command: |
            if ! docker manifest inspect $BASE_IMAGE > /dev/null 2>&1; then
              docker build -f Dockerfile.base \
                --pull \
                --platform linux/amd64 \
                -t $BASE_IMAGE \
                -t $BASE_IMAGE_NAME:latest .
              echo "BASE_WAS_BUILT=1" >> "$BASH_ENV"
            else
              echo "Using existing base image from registry: $BASE_IMAGE"
              echo "BASE_WAS_BUILT=0" >> "$BASH_ENV"
            fi
      - run:
          name: Build Docker image (production)
          no_output_timeout: 3h
          command: |
            if [[ "$BUILD_PRODUCTION_IMAGE" == "1" || "$BASE_WAS_BUILT" == "1" ]]; then
              if [[ -n "$CIRCLE_TAG" ]]; then
                THISVERSION="$CIRCLE_TAG"
              else
                THISVERSION="0+build"
              fi
              sed -i "s/title = {xcp_d}/title = {xcp_d ${THISVERSION}}/" xcp_d/data/boilerplate.bib
              e=1 && for i in {1..5}; do
                docker build \
                  --target xcp_d \
                  --rm=false \
                  -t pennlinc/xcp_d:latest \
                  --platform linux/amd64 \
                  --build-arg BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
                  --build-arg VCS_REF="$(git rev-parse --short HEAD)" \
                  --build-arg VERSION="$THISVERSION" . \
                && e=0 && break || sleep 15
              done && [ "$e" -eq "0" ]
            else
              echo "Skipping production image build."
            fi
      - run:
          name: Build Docker image (test)
          no_output_timeout: 90m
          command: |
            if [[ "$BUILD_TEST_IMAGE" == "1" || "$BASE_WAS_BUILT" == "1" ]]; then
              docker build \
                --target test \
                --rm=false \
                -t pennlinc/xcp_d:test \
                --platform linux/amd64 .
            elif docker image inspect pennlinc/xcp_d:test > /dev/null 2>&1; then
              echo "Reusing existing local test image."
            elif docker pull localhost:5000/xcp_d-test; then
              docker tag localhost:5000/xcp_d-test pennlinc/xcp_d:test
            else
              docker build \
                --target test \
                --rm=false \
                -t pennlinc/xcp_d:test \
                --platform linux/amd64 .
            fi
      - run:
          name: Verify Docker images
          command: |
            if [[ "$BUILD_PRODUCTION_IMAGE" == "1" || "$BASE_WAS_BUILT" == "1" ]]; then
              docker run --rm pennlinc/xcp_d:latest --version
            fi
            docker run --rm --entrypoint pytest pennlinc/xcp_d:test --version
            docker run --rm --entrypoint pandoc pennlinc/xcp_d:test --version > /dev/null
            docker run --rm --entrypoint 3dReHo pennlinc/xcp_d:test -help > /dev/null
      - run:
          name: Push base image to Docker Hub (if newly built)
          command: |
            if [[ "$BASE_WAS_BUILT" == "1" ]] && docker image inspect $BASE_IMAGE > /dev/null 2>&1; then
              if [[ -n "$DOCKERHUB_TOKEN" ]]; then
                docker push $BASE_IMAGE
                docker push $BASE_IMAGE_NAME:latest
              fi
            fi
      - run:
          name: Push images to local registry
          no_output_timeout: 40m
          command: |
            if [[ "$BUILD_PRODUCTION_IMAGE" == "1" || "$BASE_WAS_BUILT" == "1" ]]; then
              docker tag pennlinc/xcp_d:latest localhost:5000/xcp_d
              docker push localhost:5000/xcp_d
            fi
            docker tag pennlinc/xcp_d:test localhost:5000/xcp_d-test
            docker push localhost:5000/xcp_d-test
      - run:
          name: Docker registry garbage collection
          command: |
            docker exec registry /bin/registry garbage-collect --delete-untagged \
              /etc/docker/registry/config.yml
      - run:
          name: Record successful image prep
          command: |
            mkdir -p /tmp/images
            touch /tmp/images/imageprep-success.marker
            docker save registry:2 -o /tmp/images/registry.tar.gz
      - save_cache:
          key: build-v2-{{ checksum "Dockerfile" }}-{{ checksum "Dockerfile.base" }}-{{ checksum "pixi.lock" }}
          paths:
            - /tmp/docker
            - /tmp/images

  get_data:
    <<: *machine_defaults
    steps:
      - restore_cache:
          keys:
            - data-v1-{{ .Branch }}-{{ .Revision }}
            - data-v1--{{ .Revision }}
            - data-v1-{{ .Branch }}-
            - data-v1-main-
            - data-v1-
      - run:
          name: Download XCP-D integration test data
          command: |
            download_one() {
              local dset=$1
              local url=$2
              if [[ -d /tmp/data/${dset} ]]; then
                echo "${dset} data was cached"
                return 0
              fi
              mkdir -p /tmp/data/${dset}
              wget --retry-connrefused --waitretry=5 --read-timeout=20 --timeout=15 -t 0 -q \
                -O /tmp/${dset}.tar.gz "${url}" || return 1
              tar xzf /tmp/${dset}.tar.gz -C /tmp/data/${dset}
              rm -f /tmp/${dset}.tar.gz
              echo "Downloaded ${dset}"
            }
            download_one ds001419 'https://upenn.box.com/shared/static/yye7ljcdodj9gd6hm2r6yzach1o6xq1d.tar.gz'
            download_one ds001419-aroma 'https://upenn.box.com/shared/static/dexcmnlj7yujudr3muu05kch66sko4mt.tar.gz'
            download_one schaefer100 'https://upenn.box.com/shared/static/b9pn9qebr41kteant4ym2q5u4kcbgiy6.tar.gz'
            download_one pnc 'https://upenn.box.com/shared/static/ui2847ys49d82pgn5ewai1mowcmsv2br.tar.gz'
            download_one ukbiobank 'https://upenn.box.com/shared/static/p5h1eg4p5cd2ef9ehhljlyh1uku0xe97.tar.gz'
            download_one fmriprepwithoutfreesurfer 'https://upenn.box.com/shared/static/seyp1cu9w5v3ds6iink37hlsa217yge1.tar.gz'
            download_one nibabies 'https://upenn.box.com/shared/static/rsd7vpny5imv3qkd7kpuvdy9scpnfpe2.tar.gz'
      - save_cache:
          key: data-v1-{{ .Branch }}-{{ .Revision }}
          paths:
            - /tmp/data

  ds001419_nifti:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/xcp_d
      - run:
          name: Check whether integration tests should be skipped
          command: |
            if [[ "$( git log --format=oneline -n 1 $CIRCLE_SHA1 | grep -i -E '\[skip[ _]?integration\]' )" != "" ]]; then
              echo "Skipping ds001419_nifti"
              circleci step halt
            fi
      - restore_build_and_data
      - run_integration_test:
          marker: ds001419_nifti
          cpus: 4

  ds001419_cifti:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/xcp_d
      - run:
          name: Check whether integration tests should be skipped
          command: |
            if [[ "$( git log --format=oneline -n 1 $CIRCLE_SHA1 | grep -i -E '\[skip[ _]?integration\]' )" != "" ]]; then
              echo "Skipping ds001419_cifti"
              circleci step halt
            fi
      - restore_build_and_data
      - run_integration_test:
          marker: ds001419_cifti
          cpus: 8

  ukbiobank:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/xcp_d
      - run:
          name: Check whether integration tests should be skipped
          command: |
            if [[ "$( git log --format=oneline -n 1 $CIRCLE_SHA1 | grep -i -E '\[skip[ _]?integration\]' )" != "" ]]; then
              echo "Skipping ukbiobank"
              circleci step halt
            fi
      - restore_build_and_data
      - run_integration_test:
          marker: ukbiobank
          cpus: 2

  pnc_cifti:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/xcp_d
      - run:
          name: Check whether integration tests should be skipped
          command: |
            if [[ "$( git log --format=oneline -n 1 $CIRCLE_SHA1 | grep -i -E '\[skip[ _]?integration\]' )" != "" ]]; then
              echo "Skipping pnc_cifti"
              circleci step halt
            fi
      - restore_build_and_data
      - run_integration_test:
          marker: pnc_cifti
          cpus: 2

  pnc_cifti_t2wonly:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/xcp_d
      - run:
          name: Check whether integration tests should be skipped
          command: |
            if [[ "$( git log --format=oneline -n 1 $CIRCLE_SHA1 | grep -i -E '\[skip[ _]?integration\]' )" != "" ]]; then
              echo "Skipping pnc_cifti_t2wonly"
              circleci step halt
            fi
      - restore_build_and_data
      - run_integration_test:
          marker: pnc_cifti_t2wonly
          cpus: 2

  fmriprep_without_freesurfer:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/xcp_d
      - run:
          name: Check whether integration tests should be skipped
          command: |
            if [[ "$( git log --format=oneline -n 1 $CIRCLE_SHA1 | grep -i -E '\[skip[ _]?integration\]' )" != "" ]]; then
              echo "Skipping fmriprep_without_freesurfer"
              circleci step halt
            fi
      - restore_build_and_data
      - run_integration_test:
          marker: fmriprep_without_freesurfer
          cpus: 4

  fmriprep_without_freesurfer_with_main:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/xcp_d
      - run:
          name: Check whether integration tests should be skipped
          command: |
            if [[ "$( git log --format=oneline -n 1 $CIRCLE_SHA1 | grep -i -E '\[skip[ _]?integration\]' )" != "" ]]; then
              echo "Skipping fmriprep_without_freesurfer_with_main"
              circleci step halt
            fi
      - restore_build_and_data
      - run_integration_test:
          marker: fmriprep_without_freesurfer_with_main
          cpus: 2

  nibabies:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/xcp_d
      - run:
          name: Check whether integration tests should be skipped
          command: |
            if [[ "$( git log --format=oneline -n 1 $CIRCLE_SHA1 | grep -i -E '\[skip[ _]?integration\]' )" != "" ]]; then
              echo "Skipping nibabies"
              circleci step halt
            fi
      - restore_build_and_data
      - run_integration_test:
          marker: nibabies
          cpus: 2

  pytests:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/xcp_d
      - run:
          name: Check whether pytests should be skipped
          command: |
            if [[ "$( git log --format=oneline -n 1 $CIRCLE_SHA1 | grep -i -E '\[skip[ _]?pytests\]' )" != "" ]]; then
              echo "Skipping pytests"
              circleci step halt
            fi
      - restore_build_and_data
      - run:
          name: Run pytest on tests directory
          no_output_timeout: 1h
          command: |
            mkdir -p /tmp/out /tmp/work /tmp/coverage
            docker run --rm \
              -e CIRCLE_CPUS=4 \
              -e COVERAGE_FILE=/coverage/.coverage.pytests \
              -v /tmp/src/xcp_d:/tmp/src/xcp_d:ro \
              -v /tmp/data:/data \
              -v /tmp/out:/out \
              -v /tmp/work:/work \
              -v /tmp/coverage:/coverage \
              -w /tmp/src/xcp_d \
              --entrypoint pytest \
              pennlinc/xcp_d:test \
              --cov-append --cov-branch --cov-report term-missing --cov=xcp_d \
              --data_dir=/data --output_dir=/out --working_dir=/work \
              xcp_d
      - persist_to_workspace:
          root: /tmp/coverage
          paths:
            - .coverage.pytests
      - store_artifacts:
          path: /tmp/out

  merge_coverage:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/xcp_d
      - attach_workspace:
          at: /tmp/coverage
      - run:
          name: Merge coverage files
          command: |
            pyenv local 3
            pip install coverage
            cd /tmp/src/xcp_d
            coverage combine /tmp/coverage/
            coverage xml -o /tmp/coverage/coverage.xml
      - store_artifacts:
          path: /tmp/coverage
      - run:
          name: Quick fix for GPG error in Codecov
          command: mkdir -p ~/.gnupg
      - codecov/upload:
          file: /tmp/coverage/coverage.xml

  deployable:
    docker:
      - image: busybox:latest
    steps:
      - run: echo Deploying!

  deploy_docker:
    <<: *machine_defaults
    steps:
      - checkout:
          path: /tmp/src/xcp_d
      - restore_cache:
          keys:
            - build-v2-{{ checksum "Dockerfile" }}-{{ checksum "Dockerfile.base" }}-{{ checksum "pixi.lock" }}
      - run: *docker_auth
      - run: *setup_docker_registry
      - run: *pull_from_registry
      - run:
          name: Deploy to Docker Hub
          no_output_timeout: 40m
          command: |
            if [[ -n "$DOCKERHUB_TOKEN" ]]; then
              docker tag pennlinc/xcp_d:latest pennlinc/xcp_d:unstable
              docker push pennlinc/xcp_d:unstable
              if [[ -n "$CIRCLE_TAG" ]]; then
                docker tag pennlinc/xcp_d:latest pennlinc/xcp_d:$CIRCLE_TAG
                docker push pennlinc/xcp_d:latest
                docker push pennlinc/xcp_d:$CIRCLE_TAG
              fi
            fi

workflows:
  version: 2
  build_test_deploy:
    jobs:
      - image_prep:
          filters:
            tags:
              only: /.*/

      - get_data:
          filters:
            branches:
              ignore:
                - /docs?\/.*/
                - /tests?\/.*/
            tags:
              only: /.*/

      - ds001419_nifti:
          requires: [image_prep, get_data]
          filters:
            branches:
              ignore:
                - /docs?\/.*/
                - /tests?\/.*/
            tags:
              only: /.*/

      - ds001419_cifti:
          requires: [image_prep, get_data]
          filters:
            branches:
              ignore:
                - /docs?\/.*/
                - /tests?\/.*/
            tags:
              only: /.*/

      - ukbiobank:
          requires: [image_prep, get_data]
          filters:
            branches:
              ignore:
                - /docs?\/.*/
                - /tests?\/.*/
            tags:
              only: /.*/

      - pnc_cifti:
          requires: [image_prep, get_data]
          filters:
            branches:
              ignore:
                - /docs?\/.*/
                - /tests?\/.*/
            tags:
              only: /.*/

      - pnc_cifti_t2wonly:
          requires: [image_prep, get_data]
          filters:
            branches:
              ignore:
                - /docs?\/.*/
                - /tests?\/.*/
            tags:
              only: /.*/

      - fmriprep_without_freesurfer:
          requires: [image_prep, get_data]
          filters:
            branches:
              ignore:
                - /docs?\/.*/
                - /tests?\/.*/
            tags:
              only: /.*/

      - fmriprep_without_freesurfer_with_main:
          requires: [image_prep, get_data]
          filters:
            branches:
              ignore:
                - /docs?\/.*/
                - /tests?\/.*/
            tags:
              only: /.*/

      - nibabies:
          requires: [image_prep, get_data]
          filters:
            branches:
              ignore:
                - /docs?\/.*/
                - /tests?\/.*/
            tags:
              only: /.*/

      - pytests:
          requires: [image_prep, get_data]
          filters:
            branches:
              ignore:
                - /docs?\/.*/
                - /tests?\/.*/
            tags:
              only: /.*/

      - merge_coverage:
          requires:
            - ds001419_nifti
            - ds001419_cifti
            - ukbiobank
            - pnc_cifti
            - pnc_cifti_t2wonly
            - fmriprep_without_freesurfer
            - fmriprep_without_freesurfer_with_main
            - nibabies
            - pytests
          filters:
            branches:
              ignore:
                - /docs?\/.*/
                - /tests?\/.*/
            tags:
              only: /.*/

      - deployable:
          requires:
            - image_prep
            - ds001419_nifti
            - ds001419_cifti
            - ukbiobank
            - pnc_cifti
            - pnc_cifti_t2wonly
            - fmriprep_without_freesurfer
            - fmriprep_without_freesurfer_with_main
            - nibabies
            - pytests
          filters:
            branches:
              only: main
            tags:
              only: /.*/

      - deploy_docker:
          requires: [deployable]
          filters:
            branches:
              only: main
            tags:
              only: /.*/
